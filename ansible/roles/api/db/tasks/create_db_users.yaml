- name: Ensure user has access to the database
  sudo_user: postgres
  postgresql_user:
    db: db
    name: api
    password: password
    priv: ALL
    state: present

- name: Ensure user does not have unnecessary privileges
  sudo_user: postgres
  postgresql_user:
    name: api
    role_attr_flags: NOSUPERUSER,NOCREATEDB
    state: present
